<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Alertes Taches</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #ffffff;
        color: #7a1f17;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .shell {
        width: 100%;
        height: 100%;
        background: #ffffff;
        padding: 26px 26px 22px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .logo {
        width: 112px;
        height: 112px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .logo img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .eyebrow {
        margin: 22px 0 0;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: #d84a3a;
      }

      h1 {
        margin: 12px 0 0;
        font-size: 30px;
        line-height: 1.1;
        color: #8a261d;
      }

      p {
        margin: 12px 0 0;
        color: #8f433b;
        font-size: 14px;
        line-height: 1.65;
      }

      .status {
        margin: 24px auto 0;
        display: inline-flex;
        align-items: center;
        gap: 12px;
        border-radius: 999px;
        border: 1px solid rgba(198, 61, 47, 0.15);
        background: #fff5f3;
        padding: 11px 16px;
        font-size: 14px;
        color: #a13328;
      }

      .spinner {
        width: 16px;
        height: 16px;
        border-radius: 999px;
        border: 2px solid rgba(198, 61, 47, 0.18);
        border-top-color: #c63d2f;
        animation: spin 0.9s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <main class="shell" aria-live="polite">
      <div class="logo" aria-hidden="true">
        <img src="./app-logo.png" alt="Logo Alertes Taches" />
      </div>
      <p class="eyebrow">Desktop App</p>
      <h1>Alertes Taches</h1>
      <p>Chargement de l'application et preparation de votre espace de travail.</p>
      <div class="status">
        <span class="spinner" aria-hidden="true"></span>
        <span>Initialisation en cours...</span>
      </div>
    </main>
  </body>
</html>
